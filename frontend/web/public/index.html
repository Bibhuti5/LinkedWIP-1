<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DevSocial - Connect, share, and grow with fellow developers worldwide" />
  <meta name="theme-color" content="#1976d2" />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://devsocial.app/" />
  <meta property="og:title" content="DevSocial - Developer Social Platform" />
  <meta property="og:description" content="Connect, share, and grow with fellow developers worldwide" />
  <meta property="og:image" content="/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://devsocial.app/" />
  <meta property="twitter:title" content="DevSocial - Developer Social Platform" />
  <meta property="twitter:description" content="Connect, share, and grow with fellow developers worldwide" />
  <meta property="twitter:image" content="/og-image.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Preconnect to external domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <title>DevSocial - Developer Social Platform</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
