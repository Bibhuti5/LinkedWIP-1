# User Service Configuration
server:
  port: 8082

spring:
  application:
    name: user-service
    version: 1.0.0
    description: User Management and Social Features Service
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/devsocial_user
    username: ${DB_USERNAME:devsocial}
    password: ${DB_PASSWORD:devsocial123}
    driver-class-name: org.postgresql.Driver
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false
  
  # Redis Configuration for Caching
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 1
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  
  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 minutes
      cache-null-values: false
    cache-names:
      - github-users
      - github-repos
      - user-profiles
      - follow-suggestions

# GitHub API Configuration
github:
  api:
    base-url: https://api.github.com
    token: ${GITHUB_API_TOKEN:}
    rate-limit:
      requests-per-hour: 5000
      requests-per-minute: 60

# JWT Configuration (for authentication with other services)
jwt:
  secret: ${JWT_SECRET:devSocialSecretKeyThatIsVeryLongAndSecureForProductionUseWithAtLeast256Bits}
  expiration: 86400000  # 24 hours

# CORS Configuration
cors:
  allowed-origins: 
    - http://localhost:3000
    - http://localhost:3001
    - ${FRONTEND_URL:http://localhost:3000}
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers:
    - "*"
  allow-credentials: true

# Logging Configuration
logging:
  level:
    com.devsocial.user: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/user-service.log

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
    db:
      enabled: true

# Application Information
info:
  app:
    name: User Service
    description: DevSocial User Profile and Social Connection Management
    version: 1.0.0
    contact:
      name: DevSocial Team
      email: team@devsocial.com

# Async Configuration
async:
  core-pool-size: 5
  max-pool-size: 10
  queue-capacity: 100
  thread-name-prefix: UserService-

# Pagination Configuration
pagination:
  default-page-size: 20
  max-page-size: 100

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

logging:
  level:
    com.devsocial.user: DEBUG
    org.springframework.web: DEBUG

---
# Docker Profile
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres:5432/devsocial_user
    
  data:
    redis:
      host: redis
      port: 6379

server:
  port: 8082

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.devsocial.user: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

---
# Swagger/OpenAPI Configuration (All Profiles)
swagger:
  api:
    version: 1.0.0
    description: "DevSocial User Management API - Handles user profiles, social connections, and GitHub integration"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true