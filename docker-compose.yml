version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:13-alpine
    container_name: devsocial-postgres
    environment:
      POSTGRES_DB: devsocial
      POSTGRES_USER: devsocial
      POSTGRES_PASSWORD: devsocial123
      POSTGRES_MULTIPLE_DATABASES: devsocial_auth,devsocial_user,devsocial_post,devsocial_message
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - devsocial-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devsocial -d devsocial"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis for caching and real-time features
  redis:
    image: redis:6-alpine
    container_name: devsocial-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - devsocial-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Authentication Service
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: devsocial-auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=devsocial
      - DB_PASSWORD=devsocial123
      - DATABASE_URL=jdbc:postgresql://postgres:5432/devsocial_auth
      - JWT_SECRET=devSocialSecretKeyThatIsVeryLongAndSecureForProductionUseWithAtLeast256Bits
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-your_github_client_id}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-your_github_client_secret}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-your_google_client_id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-your_google_client_secret}
      - FRONTEND_URL=http://localhost:3000
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devsocial-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # User Service
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: devsocial-user-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=devsocial
      - DB_PASSWORD=devsocial123
      - DATABASE_URL=jdbc:postgresql://postgres:5432/devsocial_user
      - JWT_SECRET=devSocialSecretKeyThatIsVeryLongAndSecureForProductionUseWithAtLeast256Bits
      - AUTH_SERVICE_URL=http://auth-service:8081
      - GITHUB_API_URL=https://api.github.com
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - devsocial-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Post Service
  post-service:
    build:
      context: ./post-service
      dockerfile: Dockerfile
    container_name: devsocial-post-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=devsocial
      - DB_PASSWORD=devsocial123
      - DATABASE_URL=jdbc:postgresql://postgres:5432/devsocial_post
      - JWT_SECRET=devSocialSecretKeyThatIsVeryLongAndSecureForProductionUseWithAtLeast256Bits
      - AUTH_SERVICE_URL=http://auth-service:8081
      - USER_SERVICE_URL=http://user-service:8082
      - MEDIA_SERVICE_URL=http://media-service:8085
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - devsocial-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Message Service
  message-service:
    build:
      context: ./message-service
      dockerfile: Dockerfile
    container_name: devsocial-message-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=devsocial
      - DB_PASSWORD=devsocial123
      - DATABASE_URL=jdbc:postgresql://postgres:5432/devsocial_message
      - JWT_SECRET=devSocialSecretKeyThatIsVeryLongAndSecureForProductionUseWithAtLeast256Bits
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUTH_SERVICE_URL=http://auth-service:8081
      - USER_SERVICE_URL=http://user-service:8082
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - devsocial-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Media Service
  media-service:
    build:
      context: ./media-service
      dockerfile: Dockerfile
    container_name: devsocial-media-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=devsocial
      - DB_PASSWORD=devsocial123
      - DATABASE_URL=jdbc:postgresql://postgres:5432/devsocial
      - JWT_SECRET=devSocialSecretKeyThatIsVeryLongAndSecureForProductionUseWithAtLeast256Bits
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-devsocial-media}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AUTH_SERVICE_URL=http://auth-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - devsocial-network
    volumes:
      - media_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # API Gateway
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: devsocial-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - AUTH_SERVICE_URL=http://auth-service:8081
      - USER_SERVICE_URL=http://user-service:8082
      - POST_SERVICE_URL=http://post-service:8083
      - MESSAGE_SERVICE_URL=http://message-service:8084
      - MEDIA_SERVICE_URL=http://media-service:8085
      - JWT_SECRET=devSocialSecretKeyThatIsVeryLongAndSecureForProductionUseWithAtLeast256Bits
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      post-service:
        condition: service_healthy
      message-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
    networks:
      - devsocial-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: devsocial-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - devsocial-network

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: devsocial-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - devsocial-network
    depends_on:
      - prometheus

  # Development Tools - Adminer (Database GUI)
  adminer:
    image: adminer:latest
    container_name: devsocial-adminer
    ports:
      - "8090:8080"
    networks:
      - devsocial-network
    depends_on:
      - postgres

  # Development Tools - Redis Commander (Redis GUI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: devsocial-redis-commander
    ports:
      - "8091:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    networks:
      - devsocial-network
    depends_on:
      - redis

# Networks
networks:
  devsocial-network:
    driver: bridge
    name: devsocial-network

# Volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_uploads:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local